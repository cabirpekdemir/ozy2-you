<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#08090e">
  <title>OZY2</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" type="image/png" href="/static/icons/favicon.png">
  <link rel="apple-touch-icon" href="/static/icons/favicon.png">
  <link rel="stylesheet" href="/static/css/design.css">
</head>
<body>

<div id="app">

  <!-- ── Sidebar (Desktop) ──────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="ozy-logo">
        <img src="/static/icons/logo.png" alt="OZY2" style="height:28px;width:auto;display:block;">
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label" data-i18n="navgroup.main">MAIN</div>
      <div class="nav-item active" data-panel="chat" onclick="showPanel('chat')">
        <span class="nav-icon">💬</span>
        <span data-i18n="nav.chat">Chat</span>
      </div>
      <div class="nav-item" data-panel="home" onclick="showPanel('home')">
        <span class="nav-icon">🏡</span>
        <span data-i18n="nav.home">Home</span>
      </div>
      <div class="nav-item" data-panel="tasks" onclick="showPanel('tasks')">
        <span class="nav-icon">✅</span>
        <span data-i18n="nav.tasks">Tasks</span>
      </div>
      <div class="nav-item" data-panel="memory" onclick="showPanel('memory')">
        <span class="nav-icon">🧠</span>
        <span data-i18n="nav.memory">Memory</span>
      </div>
      <div class="nav-item" data-panel="briefing" onclick="showPanel('briefing')">
        <span class="nav-icon">☀️</span>
        <span data-i18n="nav.briefing">Briefing</span>
      </div>

      <div class="nav-section-label" data-i18n="navgroup.communication">COMMUNICATION</div>
      <div class="nav-item" data-panel="gmail" onclick="showPanel('gmail')">
        <span class="nav-icon">📧</span>
        <span data-i18n="nav.gmail">Gmail</span>
        <span class="nav-badge hidden" id="badge-gmail">0</span>
      </div>
      <div class="nav-item" data-panel="calendar" onclick="showPanel('calendar')">
        <span class="nav-icon">📅</span>
        <span data-i18n="nav.calendar">Calendar</span>
      </div>
      <div class="nav-item" data-panel="telegram" onclick="showPanel('telegram')">
        <span class="nav-icon" style="display:flex;align-items:center;justify-content:center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#2AABEE">
            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 13.67 4.25 12.79c-.64-.204-.657-.64.135-.954l11.57-4.461c.537-.194 1.006.131.839.845z"/>
          </svg>
        </span>
        <span data-i18n="nav.telegram">Telegram</span>
      </div>
      <div class="nav-item" data-panel="whatsapp" onclick="showPanel('whatsapp')">
        <span class="nav-icon" style="display:flex;align-items:center;justify-content:center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#25D366">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </span>
        <span data-i18n="nav.whatsapp">WhatsApp</span>
      </div>

      <div class="nav-section-label" data-i18n="navgroup.productivity">PRODUCTIVITY</div>
      <div class="nav-item" data-panel="projects" onclick="showPanel('projects')">
        <span class="nav-icon">🗺️</span>
        <span data-i18n="nav.projects">Projects</span>
      </div>
      <div class="nav-item" data-panel="drive" onclick="showPanel('drive')">
        <span class="nav-icon">📁</span>
        <span data-i18n="nav.drive">Drive</span>
      </div>
      <div class="nav-item" data-panel="github" onclick="showPanel('github')">
        <span class="nav-icon">🐙</span>
        <span data-i18n="nav.github">GitHub</span>
      </div>
      <div class="nav-item" data-panel="workspace" onclick="showPanel('workspace')">
        <span class="nav-icon">🗂️</span>
        <span data-i18n="nav.workspace">Workspace</span>
      </div>

      <div class="nav-section-label" data-i18n="navgroup.creative">CREATIVE</div>
      <div class="nav-item" data-panel="youtube" onclick="showPanel('youtube')">
        <span class="nav-icon">▶️</span>
        <span data-i18n="nav.youtube">YouTube</span>
      </div>
      <div class="nav-item" data-panel="content" onclick="showPanel('content')">
        <span class="nav-icon">🎨</span>
        <span data-i18n="nav.content">Content</span>
      </div>
      <div class="nav-item" data-panel="debate" onclick="showPanel('debate')">
        <span class="nav-icon">🤖</span>
        <span data-i18n="nav.debate">AI Debate</span>
      </div>

      <div class="nav-section-label" data-i18n="navgroup.system">SYSTEM</div>
      <div class="nav-item" data-panel="skills" onclick="showPanel('skills')">
        <span class="nav-icon">⚡</span>
        <span data-i18n="nav.skills">Skills</span>
      </div>
      <div class="nav-item" data-panel="automations" onclick="showPanel('automations')">
        <span class="nav-icon">⚙️</span>
        <span data-i18n="nav.automations">Automations</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="nav-item" data-panel="settings" onclick="showPanel('settings')">
        <span class="nav-icon">🔧</span>
        <span data-i18n="nav.settings">Settings</span>
      </div>
    </div>
  </aside>

  <!-- ── Main ──────────────────────────────────────────── -->
  <main id="main">

    <!-- Topbar -->
    <div id="topbar">
      <button class="btn btn-ghost btn-icon" id="sidebar-toggle"
              onclick="toggleSidebar()" style="display:none">☰</button>
      <span class="topbar-title" id="topbar-title">Chat</span>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>

    <!-- Panels -->
    <div id="content">

      <!-- Chat -->
      <div class="panel active" id="panel-chat"></div>

      <!-- Other panels — lazy loaded -->
      <div class="panel" id="panel-home"></div>
      <div class="panel" id="panel-tasks"></div>
      <div class="panel" id="panel-memory"></div>
      <div class="panel" id="panel-briefing"></div>
      <div class="panel" id="panel-gmail"></div>
      <div class="panel" id="panel-calendar"></div>
      <div class="panel" id="panel-telegram"></div>
      <div class="panel" id="panel-whatsapp"></div>
      <div class="panel" id="panel-projects"></div>
      <div class="panel" id="panel-drive"></div>
      <div class="panel" id="panel-github"></div>
      <div class="panel" id="panel-workspace"></div>
      <div class="panel" id="panel-youtube"></div>
      <div class="panel" id="panel-content"></div>
      <div class="panel" id="panel-debate"></div>
      <div class="panel" id="panel-skills"></div>
      <div class="panel" id="panel-automations"></div>
      <div class="panel" id="panel-settings"></div>

    </div>
  </main>
</div>

<!-- ── Bottom Nav (Mobile) ────────────────────────────── -->
<nav id="bottom-nav">
  <div class="bottom-nav-inner">
    <div class="bnav-item active" data-panel="chat" onclick="showPanel('chat')">
      <span class="bnav-icon">💬</span>
      <span data-i18n="nav.chat">Chat</span>
    </div>
    <div class="bnav-item" data-panel="tasks" onclick="showPanel('tasks')">
      <span class="bnav-icon">✅</span>
      <span data-i18n="nav.tasks">Tasks</span>
    </div>
    <div class="bnav-item" data-panel="gmail" onclick="showPanel('gmail')">
      <span class="bnav-icon">📧</span>
      <span data-i18n="nav.gmail">Gmail</span>
    </div>
    <div class="bnav-item" data-panel="memory" onclick="showPanel('memory')">
      <span class="bnav-icon">🧠</span>
      <span data-i18n="nav.memory">Memory</span>
    </div>
    <div class="bnav-item" data-panel="settings" onclick="showPanel('settings')">
      <span class="bnav-icon">🔧</span>
      <span data-i18n="nav.settings">Settings</span>
    </div>
  </div>
</nav>

<!-- ── Toast container ────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Scripts ────────────────────────────────────────── -->
<script src="/static/js/i18n.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/panels/chat.js"></script>
</body>
</html>
