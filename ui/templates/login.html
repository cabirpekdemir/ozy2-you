<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OZY2 — Login</title>
  <link rel="icon" type="image/png" href="/static/icons/favicon.png">
  <link rel="shortcut icon" type="image/png" href="/static/icons/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #080a10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      color: #e8eaf2;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, #4f8ef722 0%, transparent 70%);
      pointer-events: none;
    }

    .login-box {
      background: #0e1118;
      border: 1px solid #1e2130;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      background: #fff;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      margin-bottom: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    .logo-wrap img {
      height: 52px;
      width: auto;
      display: block;
    }

    .subtitle {
      font-size: 13px;
      color: #5a6380;
      margin-bottom: 36px;
    }

    .pin-label {
      font-size: 12px;
      color: #5a6380;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .pin-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #2a2f45;
      background: transparent;
      transition: all .15s;
    }
    .pin-dot.filled {
      background: #4f8ef7;
      border-color: #4f8ef7;
      transform: scale(1.15);
    }

    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .pin-key {
      background: #13161f;
      border: 1px solid #1e2130;
      border-radius: 14px;
      padding: 16px 0;
      font-size: 22px;
      font-weight: 600;
      color: #e8eaf2;
      cursor: pointer;
      user-select: none;
      transition: background .1s, transform .08s;
      -webkit-tap-highlight-color: transparent;
    }
    .pin-key:hover  { background: #1a1f2e; }
    .pin-key:active { background: #4f8ef722; transform: scale(.94); }

    .pin-key.delete {
      font-size: 16px;
      color: #5a6380;
    }
    .pin-key.empty {
      visibility: hidden;
      pointer-events: none;
    }

    .error-msg {
      font-size: 13px;
      color: #f43f5e;
      min-height: 20px;
      margin-bottom: 4px;
      transition: opacity .2s;
    }

    .shake {
      animation: shake .35s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%  { transform: translateX(-8px); }
      75%  { transform: translateX(8px); }
    }
  </style>
</head>
<body>

<div class="login-box" id="login-box">
  <div class="logo-wrap">
    <img src="/static/icons/logo.png" alt="OZY2">
  </div>
  <div class="subtitle">Personal AI Assistant</div>

  <div class="pin-label">Enter PIN</div>

  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
    <div class="pin-dot" id="d4"></div>
    <div class="pin-dot" id="d5"></div>
  </div>

  <div class="pin-grid">
    <button class="pin-key" onclick="press(1)">1</button>
    <button class="pin-key" onclick="press(2)">2</button>
    <button class="pin-key" onclick="press(3)">3</button>
    <button class="pin-key" onclick="press(4)">4</button>
    <button class="pin-key" onclick="press(5)">5</button>
    <button class="pin-key" onclick="press(6)">6</button>
    <button class="pin-key" onclick="press(7)">7</button>
    <button class="pin-key" onclick="press(8)">8</button>
    <button class="pin-key" onclick="press(9)">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="press(0)">0</button>
    <button class="pin-key delete" onclick="del()">⌫</button>
  </div>

  <div class="error-msg" id="error-msg"></div>
</div>

<script>
  let pin = '';
  const MAX = 6;

  function updateDots() {
    for (let i = 0; i < MAX; i++) {
      document.getElementById('d' + i)
        ?.classList.toggle('filled', i < pin.length);
    }
  }

  function press(n) {
    if (pin.length >= MAX) return;
    pin += String(n);
    updateDots();
    document.getElementById('error-msg').textContent = '';
    if (pin.length >= 4) {
      // Auto-submit after 4+ digits with short delay
      clearTimeout(window._autoSubmit);
      window._autoSubmit = setTimeout(tryLogin, pin.length === MAX ? 0 : 600);
    }
  }

  function del() {
    clearTimeout(window._autoSubmit);
    pin = pin.slice(0, -1);
    updateDots();
  }

  async function tryLogin() {
    if (pin.length < 4) return;
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin }),
      });
      const d = await r.json();
      if (d.ok) {
        window.location.replace('/');
      } else {
        document.getElementById('error-msg').textContent = 'Wrong PIN. Try again.';
        document.getElementById('login-box').classList.add('shake');
        setTimeout(() => document.getElementById('login-box').classList.remove('shake'), 400);
        pin = '';
        updateDots();
      }
    } catch {
      document.getElementById('error-msg').textContent = 'Connection error.';
    }
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') press(parseInt(e.key));
    if (e.key === 'Backspace') del();
    if (e.key === 'Enter' && pin.length >= 4) { clearTimeout(window._autoSubmit); tryLogin(); }
  });
</script>
</body>
</html>
